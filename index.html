<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Synergy Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); height: 100vh; display: flex; justify-content: center; align-items: center; color: white; }
        #chat-container { width: 90%; max-width: 600px; height: 85vh; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.15); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        #header { padding: 20px; background: rgba(0, 0, 0, 0.2); text-align: center; font-size: 1.25rem; font-weight: 600; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-message { align-self: flex-end; background: rgba(56, 189, 248, 0.85); border-bottom-right-radius: 2px; }
        .bot-message { align-self: flex-start; background: rgba(255, 255, 255, 0.15); border-bottom-left-radius: 2px; }
        #input-area { padding: 20px; display: flex; gap: 10px; background: rgba(0, 0, 0, 0.2); border-top: 1px solid rgba(255, 255, 255, 0.1); }
        input { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0, 0, 0, 0.3); color: white; font-size: 1rem; outline: none; }
        input:focus { border-color: #38bdf8; box-shadow: 0 0 10px rgba(56,189,248,0.5); }
        button { padding: 12px 24px; border-radius: 8px; border: none; background: linear-gradient(135deg, #38bdf8, #0284c7); color: white; font-weight: 600; font-size: 1rem; cursor: pointer; transition: transform 0.2s ease; }
        button:hover { transform: scale(1.05); } button:active { transform: scale(0.95); }
        .loading { font-style: italic; color: #94a3b8; font-size: 0.9rem; align-self: flex-start; background: transparent; padding:0; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="header">Agentic Synergy Hub</div>
        <div id="chat-box">
            <div class="message bot-message">Hello! I'm your AI agent. I can add tasks to your schedule or save notes to your database. How can I help you?</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type a command..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>
    <script>
        const chatBox = document.getElementById('chat-box'), inputField = document.getElementById('user-input'), btn = document.getElementById('send-btn');
        const append = (text, cls) => { const el = document.createElement('div'); el.className = 'message ' + cls; el.innerText = text; chatBox.appendChild(el); chatBox.scrollTop = chatBox.scrollHeight; return el; };
        const send = async () => {
            const text = inputField.value.trim(); if(!text) return;
            append(text, 'user-message'); inputField.value = '';
            const loading = append('Agent is thinking...', 'loading');
            try {
                const res = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: text}) });
                const data = await res.json(); chatBox.removeChild(loading); append(data.response, 'bot-message');
            } catch(e) { chatBox.removeChild(loading); append('Error', 'bot-message'); }
        };
        btn.onclick = send; inputField.onkeypress = e => { if (e.key === 'Enter') send(); };
    </script>
</body>
</html>
